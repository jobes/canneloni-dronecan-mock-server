# Cannelloni DroneCAN Mock Node Configuration

node_id: 2
node_name: "gateway.mock"
priority: 4
heartbeat_interval: 1.0
gpx: "assets/flight.gpx"
local_port: 20001
ice_reciprocating:
  interval: 1.0
  state:
    min: 0
    max: 2
  flags:
    min: 0
    max: 0
  engine_load_percent:
    min: 10
    max: 75
  engine_speed_rpm:
    min: 700
    max: 2400
  spark_dwell_time_ms:
    min: 1.5
    max: 4.5
  atmospheric_pressure_kpa:
    min: 98.0
    max: 102.5
  intake_manifold_pressure_kpa:
    min: 25.0
    max: 90.0
  intake_manifold_temperature:
    min: 300.0
    max: 390.0
  coolant_temperature:
    min: 320.0
    max: 410.0
  oil_pressure:
    min: 180.0
    max: 450.0
  oil_temperature:
    min: 320.0
    max: 410.0
  fuel_pressure:
    min: 180.0
    max: 420.0
  fuel_consumption_rate_cm3pm:
    min: 0.0
    max: 220.0
  estimated_consumed_fuel_volume_cm3:
    min: 0.0
    max: 5000.0
  throttle_position_percent:
    min: 8
    max: 70
  ecu_index:
    min: 0
    max: 0
  spark_plug_usage:
    min: 0
    max: 3
  cylinder_status:
    - ignition_timing_deg:
        min: 6.0
        max: 20.0
      injection_time_ms:
        min: 1.5
        max: 6.0
      cylinder_head_temperature:
        min: 340.0
        max: 410.0
      exhaust_gas_temperature:
        min: 700.0
        max: 980.0
      lambda_coefficient:
        min: 0.85
        max: 1.10
    - ignition_timing_deg:
        min: 6.0
        max: 20.0
      injection_time_ms:
        min: 1.5
        max: 6.0
      cylinder_head_temperature:
        min: 340.0
        max: 410.0
      exhaust_gas_temperature:
        min: 700.0
        max: 980.0
      lambda_coefficient:
        min: 0.85
        max: 1.10
